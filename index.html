<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta http-equiv="X-UA-Compatible" content="ie=edge"><title>TicTacToe</title><script defer="defer" src="main.js"></script></head><body><header><h1 class="title">TicTacToe</h1></header><div class="welcome"><h1>Enter Player</h1><div class="input-group"><label for="player1">Player1</label><input placeholder="Player1" id="player1"></div><div class="input-group"><label for="player2">Player2</label><input placeholder="Player2" id="player2"></div><button type="button" class="play-button">Play</button></div><main><div class="player-side"><h1 class="playerName player1-title"></h1><h1 class="score score1"></h1></div><div class="tictac-boxes"><div class="cell1 cells" id="1"></div><div class="cell2 cells" id="2"></div><div class="cell3 cells" id="3"></div><div class="cell4 cells" id="4"></div><div class="cell5 cells" id="5"></div><div class="cell6 cells" id="6"></div><div class="cell7 cells" id="7"></div><div class="cell8 cells" id="8"></div><div class="cell9 cells" id="9"></div></div><div class="player-side"><h1 class="playerName player2-title"></h1><h1 class="score score2"></h1></div></main><div class="play-or-reset hide"><h1 class="winner"></h1><button type="button" class="play-again-button">Play Again</button> <button type="button" class="reset-button">Reset</button></div></body></html>
