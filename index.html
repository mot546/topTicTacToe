<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="styles.css">
  <script src="javascript.js" type="module"></script>
  <title>TicTacToe</title>
</head>
<body>
  <header>
    <h1 class="title">TicTacToe</h1>
  </header>
  <dialog class="enter-name-dialog">
    <h1>Enter Player</h1>
    <div class="input-group"><label for="player1">Player1</label><input type="text" placeholder="Player1" id="player1"></div>
    <div class="input-group"><label for="player2">Player2</label><input type="text" placeholder="Player2" id="Player2" ></div>
    <button >Play</button>
    
  </dialog>
  <main>
    <div class="tictac-boxes">
      <div class="cell1 cells" ></div>
      <div class="cell2 cells" ></div>
      <div class="cell3 cells" ></div>
      <div class="cell4 cells" ></div>
      <div class="cell5 cells" ></div>
      <div class="cell6 cells" ></div>
      <div class="cell7 cells" ></div>
      <div class="cell8 cells" ></div>
      <div class="cell9 cells" ></div>
    </div>
  </main>
</body>
</html>
